<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Crewrift Replay Viewer</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      canvas.emscripten {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        outline: none;
        background: #000;
      }
    </style>
  </head>
  <body>
    <canvas
      class="emscripten"
      id="canvas"
      oncontextmenu="event.preventDefault()"
      tabindex="-1">
    </canvas>
    <script>
      var Module = {
        canvas: (function() {
          var canvas = document.getElementById("canvas");
          canvas.addEventListener("webglcontextlost", function(event) {
            event.preventDefault();
            console.error("WebGL context lost. Reload the page to recover.");
          }, false);
          return canvas;
        })()
      };
    </script>
    {{{ SCRIPT }}}
  </body>
</html>
