schedule_interval_minutes: 30

dispatch_throttle:
  enabled: true
  min_in_flight: 1
  max_in_flight: 64
  startup_buffer_seconds: 60
  target_load: 0.80
  worker_seconds_per_episode: 25

defaults:
  seating: leaderboard_neighbors
  fill_seats: strict
  min_entries_to_start: 2
  stage:
    label: Leaderboard-neighbor round
    episodes: 1
    min_episodes_per_entrant: 4

divisions:
  qualifiers:
    name: Qualifiers
    level: -99
    match:
      name: Qualifiers
      type: staging
    entrants: qualifying
    min_entries_to_start: 1
    stages:
      - id: crash_check
        schedule:
          label: Crash check
          self_play: true
          attempts: 2
          min_episodes_per_entrant: 2
        on_round_complete:
          - id: failed_crash_check
            name: Failed crash test
            criteria:
              completed_episodes_lte: 0
            actions:
              - type: update_membership
                status: disqualified
                substatus: inactive
          - id: passed_crash_check
            name: Passed crash test
            criteria:
              score_gt: 0
            actions:
              - type: update_membership
                division: competition
                status: competing
                substatus: champion
          - id: failed_score_check
            name: Score <= 0
            criteria:
              score_lte: 0
            actions:
              - type: update_membership
                status: disqualified
                substatus: inactive

  competition:
    name: Competition
    previous_name: Daily
    level: 1
    match:
      type: competition
    entrants: champions
    on_round_complete:
      - id: disqualified_non_positive_round_score
        name: Score <= 0
        criteria:
          score_lte: 0
        actions:
          - type: update_membership
            status: disqualified
            substatus: inactive
