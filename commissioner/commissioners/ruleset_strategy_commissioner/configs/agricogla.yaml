# agricogla: 4-seat worker-placement game. Same as `default` except:
#   - competition rounds run 50 episodes (not 1) so every champion is seated across
#     the 4 seats each round instead of only 4 of them.
#   - shuffled_window seating: baseline_window seats a fixed 4-wide window of consecutive
#     champions in a seed order stable across rounds, so two champions co-occur only when
#     within 3 of each other in that order -- distant champions NEVER play, round after
#     round (a banded matchup graph, not the round-robin the league wants). shuffled_window
#     permutes the order each round so the band precesses and every champion eventually faces
#     every other across rounds, which is the granularity the EWMA leaderboard aggregates at.
#   - rounds are scored by per-episode win rate (round_score: win): 1 for the episode
#     winner, 0 for everyone else (a tie for first shares the win), so the league
#     rewards winning games outright, not placement or margin.
scoring:
  round_score: win

defaults:
  seating: shuffled_window
  fill_seats: duplicate
  min_entries_to_start: 2
  stage:
    label: Round
    episodes: 50
    min_episodes_per_entrant: 1

divisions:
  qualifiers:
    name: Qualifiers
    level: -99
    match:
      name: Qualifiers
      type: staging
    entrants: qualifying
    min_entries_to_start: 1
    stages:
      - id: crash_check
        schedule:
          label: Qualifier
          self_play: true
          attempts: 2
          min_episodes_per_entrant: 2
        on_episode_complete:
          - id: qualified
            criteria:
              completed_episodes_gt: 0
            actions:
              - type: update_membership
                division: competition
                status: competing
                substatus: champion
          - id: disqualified
            criteria: otherwise
            actions:
              - type: update_membership
                status: disqualified
                substatus: inactive

  competition:
    name: Competition
    previous_name: Daily
    level: 1
    match:
      type: competition
    entrants: champions
