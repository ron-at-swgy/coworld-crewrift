<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stats Viewer</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#0b0b0b;
}
body{
  color:#e8e8e8;
  font:14px ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
  display:flex;
  flex-direction:column;
}
header{
  padding:10px 16px;
  border-bottom:1px solid #1f1f1f;
  display:flex;
  align-items:center;
  gap:16px;
}
header h1{
  margin:0;
  font-size:14px;
  font-weight:600;
  letter-spacing:.04em;
  text-transform:uppercase;
  color:#9bd1ff;
}
#status{
  color:#888;
  font-size:12px;
}
#wrap{
  flex:1;
  overflow:auto;
}
table{
  border-collapse:collapse;
  width:100%;
  table-layout:auto;
}
thead th{
  position:sticky;
  top:0;
  background:#161616;
  color:#cfcfcf;
  text-align:right;
  padding:8px 12px;
  border-bottom:1px solid #2a2a2a;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
  font-weight:600;
}
thead th.identity{
  text-align:left;
}
thead th .arrow{
  display:inline-block;
  width:10px;
  margin-left:4px;
  color:#9bd1ff;
}
tbody td{
  padding:6px 12px;
  text-align:right;
  border-bottom:1px solid #161616;
  white-space:nowrap;
}
tbody td.identity{
  text-align:left;
  color:#fff;
}
tbody tr:nth-child(2n){
  background:#101010;
}
tbody tr:hover{
  background:#1a1a1a;
}
.dim{
  color:#777;
}
</style>
</head>
<body>
<header>
  <h1>Player Stats</h1>
  <div id="status">connecting...</div>
</header>
<div id="wrap">
  <table>
    <thead>
      <tr id="head"></tr>
    </thead>
    <tbody id="body"></tbody>
  </table>
</div>
<script>
const COLUMNS=[
  {key:"identity",label:"player",numeric:false},
  {key:"reward",label:"reward",numeric:true},
  {key:"games",label:"games",numeric:true,derived:r=>r.games_imposter+r.games_crewmate},
  {key:"wins",label:"wins",numeric:true,derived:r=>r.wins_imposter+r.wins_crewmate},
  {key:"win_rate",label:"win %",numeric:true,
    derived:r=>{
      const games=r.games_imposter+r.games_crewmate;
      return games>0?(r.wins_imposter+r.wins_crewmate)/games:0;
    },
    format:v=>v>0?(v*100).toFixed(1)+"%":""
  },
  {key:"games_imposter",label:"imp games",numeric:true},
  {key:"wins_imposter",label:"imp wins",numeric:true},
  {key:"imp_rate",label:"imp %",numeric:true,
    derived:r=>r.games_imposter>0?r.wins_imposter/r.games_imposter:0,
    format:v=>v>0?(v*100).toFixed(1)+"%":""
  },
  {key:"games_crewmate",label:"crew games",numeric:true},
  {key:"wins_crewmate",label:"crew wins",numeric:true},
  {key:"crew_rate",label:"crew %",numeric:true,
    derived:r=>r.games_crewmate>0?r.wins_crewmate/r.games_crewmate:0,
    format:v=>v>0?(v*100).toFixed(1)+"%":""
  },
  {key:"kills",label:"kills",numeric:true},
  {key:"tasks",label:"tasks",numeric:true}
];

const STAT_KEYS=[
  "reward","wins_imposter","wins_crewmate",
  "games_imposter","games_crewmate","kills","tasks"
];

const players=new Map();
let sortKey="reward";
let sortDir=-1;

const url=new URL(location.href);
function defaultAddress(path){
  const protocol=location.protocol==="https:"?"wss:":"ws:";
  const host=location.host||"localhost:8080";
  return protocol+"//"+host+path;
}
const address=url.searchParams.get("address")||defaultAddress("/reward");
const reconnectSeconds=Math.max(0,Number(url.searchParams.get("reconnect"))||0);

const head=document.getElementById("head");
const body=document.getElementById("body");
const status=document.getElementById("status");

function buildHead(){
  head.innerHTML="";
  for(const col of COLUMNS){
    const th=document.createElement("th");
    th.textContent=col.label;
    if(!col.numeric)th.classList.add("identity");
    const arrow=document.createElement("span");
    arrow.className="arrow";
    arrow.textContent=sortKey===col.key?(sortDir>0?"\u25B2":"\u25BC"):"";
    th.appendChild(arrow);
    th.onclick=()=>{
      if(sortKey===col.key){
        sortDir=-sortDir;
      }else{
        sortKey=col.key;
        sortDir=col.numeric?-1:1;
      }
      buildHead();
      render();
    };
    head.appendChild(th);
  }
}

function ensurePlayer(name){
  let row=players.get(name);
  if(!row){
    row={identity:name};
    for(const k of STAT_KEYS)row[k]=0;
    players.set(name,row);
  }
  return row;
}

function applyPacket(text){
  const lines=text.split("\n");
  for(const line of lines){
    const trimmed=line.replace(/\r$/,"").trim();
    if(!trimmed)continue;
    const parts=trimmed.split(/\s+/);
    if(parts.length<3)continue;
    const name=parts[0];
    const identity=parts[1];
    const value=Number(parts[2]);
    if(!Number.isFinite(value))continue;
    if(!STAT_KEYS.includes(name))continue;
    const row=ensurePlayer(identity);
    row[name]=value;
  }
}

function colValue(row,col){
  if(col.derived)return col.derived(row);
  if(col.key==="identity")return row.identity;
  return row[col.key]||0;
}

function render(){
  const col=COLUMNS.find(c=>c.key===sortKey)||COLUMNS[1];
  const rows=Array.from(players.values());
  rows.sort((a,b)=>{
    const va=colValue(a,col);
    const vb=colValue(b,col);
    if(typeof va==="string"||typeof vb==="string"){
      return String(va).localeCompare(String(vb))*sortDir;
    }
    return (va-vb)*sortDir;
  });
  body.innerHTML="";
  for(const row of rows){
    const tr=document.createElement("tr");
    for(const c of COLUMNS){
      const td=document.createElement("td");
      const v=colValue(row,c);
      if(c.key==="identity"){
        td.classList.add("identity");
        td.textContent=v;
      }else if(c.format){
        const text=c.format(v);
        td.textContent=text||"";
        if(!text)td.classList.add("dim");
      }else{
        td.textContent=String(v);
        if(v===0)td.classList.add("dim");
      }
      tr.appendChild(td);
    }
    body.appendChild(tr);
  }
}

let socket=null,reconnectTimer=0;

function reconnect(ws){
  if(socket!==ws)return;
  socket=null;
  if(reconnectSeconds>0){
    status.textContent="reconnecting in "+reconnectSeconds+"s...";
    if(!reconnectTimer){
      reconnectTimer=setTimeout(()=>{
        reconnectTimer=0;
        connect();
      },reconnectSeconds*1000);
    }
  }else{
    status.textContent="disconnected";
  }
}

function handle(text){
  applyPacket(text);
  render();
  status.textContent=address+"  ("+players.size+" players)";
}

function connect(){
  status.textContent="connecting to "+address+"...";
  const ws=new WebSocket(address);
  socket=ws;
  ws.onmessage=event=>{
    if(socket!==ws)return;
    if(typeof event.data==="string"){
      handle(event.data);
    }else if(event.data instanceof Blob){
      event.data.text().then(text=>{
        if(socket===ws)handle(text);
      });
    }else{
      ws.close();
    }
  };
  ws.onopen=()=>{
    if(socket===ws)status.textContent=address;
  };
  ws.onclose=()=>reconnect(ws);
  ws.onerror=()=>{
    reconnect(ws);
    try{ws.close()}catch(e){}
  };
}

buildHead();
render();
connect();
</script>
</body>
</html>
