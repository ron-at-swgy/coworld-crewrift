<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Reward Viewer</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
}
body{
  color:#e8e8e8;
  font:16px ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
}
pre{
  box-sizing:border-box;
  margin:0;
  width:100%;
  height:100%;
  padding:16px;
  overflow:auto;
  white-space:pre;
  letter-spacing:0;
}
</style>
</head>
<body>
<pre id="reward"></pre>
<script>
const reward=document.getElementById("reward");
const url=new URL(location.href);
function defaultAddress(path){
  const protocol=location.protocol==="https:"?"wss:":"ws:";
  const host=location.host||"localhost:8080";
  return protocol+"//"+host+path;
}
const address=url.searchParams.get("address")||defaultAddress("/reward");
const reconnectSeconds=Math.max(0,Number(url.searchParams.get("reconnect"))||0);
let socket=null,reconnectTimer=0;

function show(text){
  reward.textContent=text;
}

function filterRewardLines(text){
  const out=[];
  const lines=text.split("\n");
  for(const line of lines){
    const trimmed=line.replace(/\r$/,"");
    if(!trimmed)continue;
    const parts=trimmed.split(/\s+/);
    if(parts.length>=1&&parts[0]==="reward"){
      out.push(trimmed);
    }
  }
  return out.join("\n");
}

function reconnect(ws){
  if(socket!==ws)return;
  socket=null;
  if(reconnectSeconds>0){
    show("reconnecting...");
    if(!reconnectTimer){
      reconnectTimer=setTimeout(()=>{
        reconnectTimer=0;
        connect();
      },reconnectSeconds*1000);
    }
  }else{
    show("disconnected...");
  }
}

function connect(){
  const ws=new WebSocket(address);
  socket=ws;
  ws.onmessage=event=>{
    if(socket!==ws)return;
    if(typeof event.data==="string"){
      show(filterRewardLines(event.data));
    }else if(event.data instanceof Blob){
      event.data.text().then(text=>{
        if(socket===ws)show(filterRewardLines(text));
      });
    }else{
      ws.close();
    }
  };
  ws.onopen=()=>{
    if(socket===ws)show("");
  };
  ws.onclose=()=>reconnect(ws);
  ws.onerror=()=>{
    reconnect(ws);
    try{ws.close()}catch(e){}
  };
}

connect();
</script>
</body>
</html>
