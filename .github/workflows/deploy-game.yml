# Deploy the Crewrift Prime coworld (game image) to the hosted Softmax platform.
#
# Required repository secret:
#   SOFTMAX_API_TOKEN  - a TEAM `usr_` token. Set it in
#                        Settings -> Secrets and variables -> Actions.
#                        The `coworld`/`softmax` CLI reads its bearer token from
#                        ~/.softmax/credentials.yaml, NOT from this env var, so the
#                        workflow seeds it headlessly via `softmax set-token`.
#
# coworld CLI version: 0.1.26 (public PyPI, requires Python 3.11-3.12; we use 3.12).
# `upload-coworld` blocks on hosted smoke certification (default 1800s timeout),
# so the job timeout is generous.
name: "Deploy Crewrift Game"

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'crewrift.nimble'
      - 'nimby.lock'
      - 'config.json'
      - 'data/**'
      - 'coworld_manifest.json'
      - 'Dockerfile'
      - 'crewrift-prime/crewrift_prime.patch.json'
      - '.github/workflows/deploy-game.yml'
  workflow_dispatch:

concurrency:
  group: deploy-game
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: SOFTMAX_OBSERVATORY
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: astral-sh/setup-uv@v6

      - name: Install coworld CLI
        run: uv pip install --system coworld==0.1.26

      - uses: docker/setup-buildx-action@v3

      - name: Build game image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --load \
            -t crewrift-game:${{ github.sha }} \
            .

      - name: Seed Softmax credentials
        env:
          SOFTMAX_API_TOKEN: ${{ secrets.SOFTMAX_API_TOKEN }}
        run: |
          if [ -z "$SOFTMAX_API_TOKEN" ]; then
            echo "::error::SOFTMAX_API_TOKEN secret is empty. Set a team usr_ token in repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          softmax set-token "$SOFTMAX_API_TOKEN" --server https://softmax.com/api
          python -c "from softmax.auth import clear_active_player_session; clear_active_player_session(server='https://softmax.com/api')"

      - name: Deploy coworld
        run: |
          coworld upload-coworld \
            --from-coworld crewrift_prime \
            --patch crewrift-prime/crewrift_prime.patch.json \
            --image game=crewrift-game:${{ github.sha }}
